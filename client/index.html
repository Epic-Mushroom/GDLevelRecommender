<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="png" href="/favicon.png" />
        <link rel="stylesheet" href="/styles/style.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Geometry Dash Level Recommender</title>
    </head>
    <body>
        <template id="level-card-template">
            <div class="vertical-flex level-card glass">
                <h3 class="level-name">Loading Level ID: <span class="level-id">?</span></h3>
                <div class="author">by <span class="author-name">-</span></div>
                <div class="tier-enjoyment-display">
                    <div class="rating-value">T<span class="tier">?</span></div>
                    <div class="rating-value">E<span class="enjoyment">?</span></div>
                </div>
                <div class="skills-display glass">
                    Loading skills...
                </div>
                <div class="level-card-widgets">
                    <i class="rec-info level-card-widget" title="Unable to get calculation info">
                        <img src="/icons/info.svg" width="28" height="28" />
                    </i>
                    <i class="trash-rec cursor-pointer level-card-widget" title="Get a new recommendation">
                        <img src="/icons/trash-xmark.svg" width="28" height="28" />
                    </i>
                    <i href="https://gdladder.com/level/" class="gddl-link level-card-widget" title="Go to GDDL page">
                        <img src="/icons/ladder.svg" width="28" height="28" />
                    </i>
                    <i class="showcase level-card-widget" title="View level on YouTube">
                        <img src="/icons/film.svg" width="28" height="28" />
                    </i>
                </div>
            </div>
        </template>

        <div id="app" class="vertical-flex">
            <div id="header">
                <div id="page-title-text" class="title-text">
                    GD Level Recommender
                </div>
                <div id="splash-text" class="splash-text">
                    using the power of math and flooding the gddl api to help you find levels to beat
                </div>
            </div>

            <form id="form" class="glass">
                <div class="tier-range horizontal-flex">
                    <label for="min-tier-field">Tier Range:</label>
                    <input type="text" id="min-tier-field" name="min-tier" class="text-field small-text-field">
                    <label for="max-tier-field">to</label>
                    <input type="text" id="max-tier-field" name="max-tier" class="text-field small-text-field">
                </div>

                <div class="username">
                    <label for="username-field">GDDL Username:</label>
                    <input type="text" id="username-field" name="username" class="text-field large-text-field">
                </div>

                <div class="skillset-options horizontal-flex">
                    <label for="match-skills" class="help-text" title="Attempts to recommend levels whose tags match the user's skillset">
                        Match user skillset?
                    </label>
                    <input type="checkbox" id="match-skills" name="match-skills" checked>
                </div>
                
                <button type="submit" id="submit-button" class="blending-shadow glass">Go</button>
            </form>

            <div id="error-container">
                <span id="error-message-text"></span>
            </div>

            <div id="recommendations-container" class="blending-shadow vertical-flex">
            </div>
        </div>
        
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
