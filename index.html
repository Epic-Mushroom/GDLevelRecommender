<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="stylesheet" href="/styles/style.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Geometry Dash Level Recommender</title>
    </head>
    <body>
        <template id="level-card-template">
            <div class="level-card vertical-flex">
                <h3>Loading Level ID: <span class="level-id">?</span></h3>
                <div class="tier-enjoyment-display">
                    <div class="rating-value">T<span class="tier">?</span></div>
                    <div class="rating-value">E<span class="enjoyment">?</span></div>
                </div>
                <div class="skills-display">
                    Loading skills...
                </div>
            </div>
        </template>

        <div id="app">
            <form id="form">
                <div><label for="min-tier-field">Minimum Tier</label>
                <input type="text" id="min-tier-field" name="min-tier" class="small-text-field"></div>
                <div><label for="max-tier-field">Maximum Tier</label>
                <input type="text" id="max-tier-field" name="max-tier" class="small-text-field"></div>
                <div><label for="username-field">GDDL Username</label>
                <input type="text" id="username-field" name="username" class="medium-text-field"></div>
                
                <button type="submit" id="submit-button">Retrieve Ratings</button>
            </form>

            <div id="error-container">
                <span id="error-message-text"></span>
            </div>

            <div id="recommendations-container" class="blending-shadow vertical-flex">
                <h2>Your recommended levels</h2>
            </div>
        </div>
        
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
